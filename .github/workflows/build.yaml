name: Run Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        
      - name: Make scripts executable
        run: chmod +x build.sh upload.sh

      # CLI call to simulated build process
      - name: Run Build
        run: |
          appName="Test App"
          ./build.sh --platform Android --project-name "${appName}"

      # CLI call to simulated upload process
      - name: Upload
        env: 
          UPLOAD_TOKEN: $ {{ secrets.UPLOAD_TOKEN }}
        run: |
          ./upload.sh android "build/Android/Test App.apk"