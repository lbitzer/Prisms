name: Run Build

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Application name"
        required: true
        default: "MyApp"
      version:
        description: "Version string (e.g. 1.0.0). Leave blank to use commit SHA."
        required: false
      enable_profiling:
        description: "Enable build profiling"
        required: false
        default: false
        type: boolean
      platform:
        description: "Target Platform"
        required: true
        default: "both"
        type: choice
        options:
          - android
          - ios
          - both
  push:
    branches:
      - production
      
jobs:
  build-android:
    if: >
      github.event_name == 'push' ||
      inputs.platform == 'both' ||
      inputs.platform == 'android'
    uses: ./.github/workflows/build-platform.yaml
    with:
      app_name: ${{ inputs.app_name }}
      version: ${{ inputs.version }}
      platform: Android
      enable_profiling: ${{ inputs.enable_profiling == true }}
    secrets:
      UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}

  build-ios:
    if: >
      github.event_name == 'push' ||
      inputs.platform == 'both' ||
      inputs.platform == 'ios'
    uses: ./.github/workflows/build-platform.yaml
    with:
      app_name: ${{ inputs.app_name }}
      version: ${{ inputs.version }}
      platform: iOS
      enable_profiling: ${{ inputs.enable_profiling == true }}
    secrets:
      UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}