name: Run Build

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Application name"
        required: true
        default: "MyApp"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        
      - name: Make scripts executable
        run: chmod +x build.sh upload.sh

      - name: Define build parameters
        id: params
        run: |
          appName="${{ inputs.app_name }}"
          echo "app_name=$appName" >> "$GITHUB_OUTPUT"

      # CLI call to simulated build process
      - name: Run Build
        run: |
          ./build.sh --platform Android --project-name "${{ steps.params.outputs.app_name }}"

      # CLI call to simulated upload process
      - name: Upload
        env: 
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
        run: |
          find "build/Android" -type f | while read ARTIFACT; do 
            ./upload.sh android "$ARTIFACT"
          done